{% if bookmark.has_quote_or_content %}
<div class="article-content e-content">
    {% if bookmark.quote_html %}
    <blockquote>
        {{ bookmark.quote_html|safe }}
    </blockquote>
    {% endif %}
    {% if bookmark.content_html %}
    <div>{{ bookmark.content_html|safe }}</div>
    {% endif %}
</div>
{% endif %}
