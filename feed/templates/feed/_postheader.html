{% if post.post_type == 'BOOKMARK' %}
    <header class="article-header">
        {% if post.in_reply_to %}
            <div>In reply to <a class="u-in-reply-to" href="{{post.in_reply_to}}">{{post.in_reply_to}}</a></div>
        {% endif %}

        <h1><a class="article-link alt u-bookmark-of {% if post.title_md %}h-cite{% endif %}" href="{{ post.url }}">{{ post.get_title_or_url_html|safe }}</a></h1>
    </header>
{% endif %}
